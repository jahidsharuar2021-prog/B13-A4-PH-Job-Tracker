<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>

    <!-- fav icon add -->
     <link rel="shortcut icon" href="jobs.png" type="image/x-icon">
    
    <!-- tailwind class link add -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
         font-family: "Geist", sans-serif;
        
        }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
   <header class="w-[80%] mx-auto ">
    <h1 class="mb-5 font-bold text-[#002C5C] text-[36px]">Job Application Tracker</h1>
    <div class="grid grid-cols-3 gap-4">

        <div class="bg-[#FFFFFF] p-5 rounded-[8px]">
            <p class="text-[#323B49] font-medium text-[14px]">Total</p>
            <p class="text-[#002C5C] font-bold">8</p>
        </div>

        <div class="bg-[#FFFFFF] p-5 rounded-[8px]">
       <p class="text-[#323B49] font-medium text-[14px]">Interview</p>
       <p class="text-[#10B981]">0</p>
        </div>

        <div class="bg-[#FFFFFF] p-5 rounded-[8px]">
            <p class="text-[#323B49] font-medium text-[14px]">Rejected</p>
            <p class="text-[#EF4444]">0</p>
        </div>
    </div>
   </header>
  </body>
</html>
